<div>

    <input [(ngModel)]="newTodo" type="text" (keyup.enter)="addTodo()">

    <p>{{ newTodo() }}</p>

    <h1>Список дел</h1>

    <div>
        @for (todo of todos(); track todo.id) {

        <div (dblclick)="deleteTodo(todo.id)" class="flex gap-x-3 {{todo.completed && 'text-red-500'}}">
            <span> {{todo.id}} </span>
            <span> {{todo.text}} </span>
            <input [(ngModel)]="todo.completed" type="checkbox">
        </div>

        }
    </div>
</div>
